<!doctype html>
<html lang="ja">

<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>えとくらし/blog</title>
 <link href="reset.css" rel="stylesheet">
 <link href="common.css" rel="stylesheet" type="text/css">
 <link href="each.css" rel="stylesheet" type="text/css">
</head>

<body oncontextmenu="return false;">

 <!--  ヘッダー -->
 <header class="header divider">
  <!-- ハンバーガーメニュー -->
  <button id="js-hamburger" class="hamburger"><span class="hamburger__line"></span></button>

  <!-- メニュー -->
  <nav id="js-globalnav" class="globalnav flex">
   <ul class="globalnav__main">
    <li class="globalnav__item"><a href="index.html">Top</a></li>
    <li class="globalnav__item"><a href="gallery.html">Gallery</a></li>
    <li class="globalnav__item"><a href="blog.html">Blog</a></li>
   </ul>
  </nav><!-- メニューここまで -->
 </header>

 <!-- メインコンテンツ -->
 <main class="mainwrapper" id="js-main">
 
  <h2 class="headingL">Blog</h2>
  <ul class="topiclist grid" id="postGrid"></ul>
 
<script src="posts-data.js"></script>
<script>
  // POSTS 配列（posts-data.js）からカードを自動生成
  const grid = document.getElementById('postGrid');
 
POSTS.forEach(post => {
  const li = document.createElement('li');
  li.innerHTML = `
    <div class="onelogbox">
      <div class="oneloginfo">
        <span class="postdata"><time>${post.date}</time></span>
        <span class="categories">${post.category}</span>
      </div>
      <div class="comment">
        <h3 class="headingS">
          <a href="blogdetail.html?id=${post.id}" style="text-decoration: none;">${post.title}</a>
        </h3>
        <p>${post.content.slice(0, 50)}${post.content.length > 50 ? '...' : ''}</p>
      </div>
    </div>
  `;
  grid.appendChild(li);
});

</script>
 </main><!-- メインコンテンツここまで -->

 <!-- ページUP -->
 <a href="#" class="pageup" id="js-pageup">
  <div class="arrow"></div>
 </a><!-- ページUPここまで -->

 <!-- フッター -->
 <footer class="divider">

 </footer>

</body>

</html>
