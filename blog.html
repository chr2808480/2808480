 <!-- メインコンテンツ -->
 <main class="mainwrapper" id="js-main">
 
  <h2 class="headingL">Blog</h2>
  <ul class="topiclist grid" id="postGrid"></ul>
 
<script src="posts-data.js"></script>
<script>
  // POSTS 配列（posts-data.js）からカードを自動生成
  const grid = document.getElementById('postGrid');
 
POSTS.forEach(post => {
  const li = document.createElement('li');
  li.innerHTML = `
    <div class="onelogbox">
      <div class="oneloginfo">
        <span class="postdata"><time>${post.date}</time></span>
        <span class="categories">${post.category}</span>
      </div>
      <div class="comment">
        <h3 class="headingS">
          <a href="blogdetail.html?id=${post.id}" style="text-decoration: none;">${post.title}</a>
        </h3>
        <p>${post.content.slice(0, 50)}${post.content.length > 50 ? '...' : ''}</p>
      </div>
    </div>
  `;
  grid.appendChild(li);
});

</script>
 </main><!-- メインコンテンツここまで -->
