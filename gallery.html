<!doctype html>
<html lang="ja" id="gallery">

<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>えとくらし/gallery</title>
 <link href="reset.css" rel="stylesheet">
 <link href="common.css" rel="stylesheet" type="text/css">
 <link href="each.css" rel="stylesheet" type="text/css">
</head>

<body oncontextmenu="return false;">
 <!--  ヘッダー -->
 <header class="header divider">

  <!-- ハンバーガーメニュー -->
  <button id="js-hamburger" class="hamburger"><span class="hamburger__line"></span></button>

  <!-- メニュー -->
  <nav id="js-globalnav" class="globalnav flex">
   <ul class="globalnav__main">
    <li class="globalnav__item"><a href="index.html">Top</a></li>
    <li class="globalnav__item"><a href="gallery.html">Gallery</a></li>
    <li class="globalnav__item"><a href="blog.html">Blog</a></li>
    <li class="globalnav__item"><a href=".html"></a></li>
   </ul>
  </nav><!-- メニューここまで -->
 </header>

 <!-- メインコンテンツ -->
 <main class="mainwrapper" id="js-main">

  <h2 class="headingL">Gallery</h2>

  <div class="gallery-header">
   <!-- galleryメニュー -->
   <ul class="flex">
    <li><a href="#landscape">イラスト</a></li>
    <li><a href="#plants">写真</a></li>
   </ul>
  </div>

  <!-- 一覧表示エリア -->
  <div class="gallery-content">
<section id="landscape">
 <h3 class="headingM">Illust <small>-イラスト-</small></h3>
 <ul id="list-view" class="gallerylist"></ul>
</section>

<section id="plants">
 <h3 class="headingM">Photo <small>-写真-</small></h3>
 <ul class="gallerylist"></ul>
 <ul id="list-view-plants" class="gallerylist"></ul>
</section>

   <!-- 全画面表示エリア（初期状態は非表示） -->
   <div id="detail-view" class="hidden">
  <div class="detail-content">
 <img id="full-image" src="" alt="">
 <p id="detail-caption">ここに説明文などを記載してください。画面をクリック（タップ）すると閉じます。</p>
</div>
  </div>
 </main><!-- メインコンテンツここまで -->

 <!-- ページUP -->
 <a href="#" class="pageup" id="js-pageup">
  <div class="arrow"></div>
 </a><!-- ページUPここまで -->

 <!-- フッター -->
 <footer class="divider">
  <!-- クレジット -->
  <small>© 2026 Illust and Life.<br>Designed by <a href="https://hiro-design.net/utsusemi/" target="_blank">Utsusemi
    Design</a>.</small>
  <!-- クレジットここまで -->
 </footer>
<script src="gallery-data.js"></script>
<script>
 const landscapeList = document.getElementById('list-view');
 const plantsList = document.getElementById('list-view-plants');

 if (landscapeList) {
  landscapeList.innerHTML = GALLERY
   .filter(g => g.category === 'landscape')
   .map(item => `
    <li class="gallerylist__item" data-full="${item.src}" data-caption="${item.caption ?? ''}">
     <img src="${item.src}" alt="" loading="lazy">
    </li>
   `).join('');
 }

 if (plantsList) {
  plantsList.innerHTML = GALLERY
   .filter(g => g.category === 'plants')
   .map(item => `
    <li class="gallerylist__item" data-full="${item.src}" data-caption="${item.caption ?? ''}">
     <img src="${item.src}" alt="" loading="lazy">
    </li>
   `).join('');
 }

</script>

 <!--JavaScrip 読込-->
 <script src="common.js" type="text/javascript"></script>
</body>

</html>
