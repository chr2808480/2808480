   <ul class="flex">

    <li><a href="#plants">写真</a></li>
   </ul>

  <div class="gallery-content">
<section id="landscape">
 <h3 class="headingM">Illust <small>-イラスト-</small></h3>
 <ul id="list-view" class="gallerylist"></ul>
</section>

<section id="plants">
 <h3 class="headingM">Photo <small>-写真-</small></h3>
 <ul class="gallerylist"></ul>
 <ul id="list-view-plants" class="gallerylist"></ul>
</section>

   <div id="detail-view" class="hidden">

 <img id="full-image" src="" alt="">

<script src="gallery-data.js"></script>
<script>
 const landscapeList = document.getElementById('list-view');
 const plantsList = document.getElementById('list-view-plants');

 if (landscapeList) {
  landscapeList.innerHTML = GALLERY
   .filter(g => g.category === 'landscape')
   .map(item => `
    <li class="gallerylist__item" data-full="${item.src}" data-caption="${item.caption ?? ''}">
     <img src="${item.src}" alt="" loading="lazy">
    </li>
   `).join('');
 }

 if (plantsList) {
  plantsList.innerHTML = GALLERY
   .filter(g => g.category === 'plants')
   .map(item => `
    <li class="gallerylist__item" data-full="${item.src}" data-caption="${item.caption ?? ''}">
     <img src="${item.src}" alt="" loading="lazy">
    </li>
   `).join('');
 }

</script>
