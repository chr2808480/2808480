<script src="posts-data.js"></script>
<script>
  // URL の ?id=... を読み取り、該当記事を POSTS から探して表示する
  const params = new URLSearchParams(window.location.search);
  const id = Number(params.get('id'));
  const post = POSTS.find(p => p.id === id);
  const container = document.getElementById('article');

  if (post) {
    container.innerHTML = `
      <div class="onelogbox">
        <div class="oneloginfo">
          <span class="postdata"><time>${post.date}</time></span>
          <span class="categories">${post.category ?? ''}</span>
        </div>
        <div class="comment">
          <h2 class="article-title">${post.title}</h2>
          <div class="body-text">${post.content}</div>
        </div>
      </div>
    `;
  } else {
    container.innerHTML = `<p class="not-found">記事が見つかりませんでした。</p>`;
  }
</script>
